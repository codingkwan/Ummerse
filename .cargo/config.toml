# ── .cargo/config.toml ─────────────────────────────────────────────────────────
# 工作区级别 Cargo 配置，重点优化编译速度

# ── 编译器后端 ─────────────────────────────────────────────────────────────────
[build]
# 并行 job 数：省略此行让 Cargo 自动使用 CPU 核数
# jobs = 0  # 注意：0 是非法值，已禁用

# ── 目标平台配置 ───────────────────────────────────────────────────────────────
[target.x86_64-pc-windows-msvc]
# rust-lld 链接器（比 link.exe 快 3-5x）
# 注意：需要安装 lld，如未安装可注释此行使用默认 link.exe
# linker = "rust-lld"
rustflags = [
    # 使用 native CPU 指令集（AVX2/SSE4 等），提升运行时性能
    "-C",
    "target-cpu=native",
]

[target.x86_64-unknown-linux-gnu]
# 使用 mold 或 lld 链接器（比 ld 快 5-10x）
# 优先尝试 mold，若未安装则使用 lld
linker = "clang"
rustflags = [
    "-C",
    "link-arg=-fuse-ld=lld",
    "-C",
    "target-cpu=native",
    "-C",
    "split-debuginfo=unpacked",
]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native", "-C", "split-debuginfo=unpacked"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native", "-C", "split-debuginfo=unpacked"]

# ── Wasm 目标 ──────────────────────────────────────────────────────────────────
[target.wasm32-unknown-unknown]
rustflags = []

# ── 网络 ───────────────────────────────────────────────────────────────────────
[net]
retry = 3
git-fetch-with-cli = false

# ── 注册表镜像（中国大陆加速，按需启用） ──────────────────────────────────────
# [source.crates-io]
# replace-with = "rsproxy"
# [source.rsproxy]
# registry = "sparse+https://rsproxy.cn/index/"

# ── 终端输出 ───────────────────────────────────────────────────────────────────
[term]
color = "auto"
verbose = false
progress.when = "auto"
progress.width = 80

# ── 环境变量 ───────────────────────────────────────────────────────────────────
[env]
# 减少 wgpu 验证层日志噪声
WGPU_BACKEND = { value = "vulkan,metal,dx12", force = false }
# Tokio 工作线程数（0 = 自动检测 CPU 核心数）
TOKIO_WORKER_THREADS = { value = "0", force = false }
