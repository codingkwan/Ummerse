# Cargo 编译加速配置
# 参考: https://doc.rust-lang.org/cargo/reference/config.html

[build]
# 使用 cranelift 加速 debug 编译（需要 rust nightly 或 stable 1.78+）
# rustc-wrapper = "sccache"   # 若安装了 sccache，取消注释可大幅加速重新编译

# 并行编译作业数（默认为 CPU 核心数，可适当调低避免内存压力）
# jobs = 8

[target.x86_64-pc-windows-msvc]
# Windows 链接器优化：使用 lld-link 或 rust-lld（比 link.exe 快 2-3x）
linker = "rust-lld"
rustflags = [
    # 调试版本使用 split-debuginfo 加快链接速度
    "-C", "split-debuginfo=packed",
    # 减少 debug 版本的代码生成优化（加快编译）
    "-C", "debuginfo=1",
]

[target.x86_64-unknown-linux-gnu]
# Linux：使用 mold 链接器（需要安装 mold）
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
rustflags = [
    "-C", "debuginfo=1",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "debuginfo=1",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "debuginfo=1",
]

# Wasm target
[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "opt-level=s",
]

# 环境变量配置
[env]
# 减少 Bevy 热重载的资产扫描频率（开发阶段加快启动）
BEVY_ASSET_SCAN = "0"
