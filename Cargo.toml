[workspace]
members = [
    "crates/ummerse-core",
    "crates/ummerse-math",
    "crates/ummerse-renderer",
    "crates/ummerse-scene",
    "crates/ummerse-asset",
    "crates/ummerse-script",
    "crates/ummerse-physics",
    "crates/ummerse-audio",
    "crates/ummerse-editor",
    "crates/ummerse-runtime",
    "crates/ummerse-plugin",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Ummerse Team"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/ummerse/ummerse"
homepage = "https://ummerse.dev"
description = "A modern 2D/3D game engine built with Rust"

[workspace.dependencies]
# Core ECS via Bevy
bevy = { version = "0.15", default-features = false, features = [
    "bevy_core_pipeline",
    "bevy_pbr",
    "bevy_render",
    "bevy_sprite",
    "bevy_text",
    "bevy_ui",
    "bevy_asset",
    "bevy_scene",
    "bevy_winit",
    "bevy_gltf",
    "bevy_animation",
    "bevy_audio",
    "png",
    "jpeg",
    "hdr",
    "ktx2",
    "tonemapping_luts",
    "webgl2",
    "x11",
    "wayland",
    "serialize",
] }

# GPU / Rendering
wgpu = { version = "22", features = ["wgsl"] }
naga = { version = "22", features = ["wgsl-in", "wgsl-out"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
ron = "0.8"

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Error handling
anyhow = "1"
thiserror = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Math
glam = { version = "0.29", features = ["serde"] }
bytemuck = { version = "1", features = ["derive"] }

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Utilities
dashmap = "6"
parking_lot = "0.12"
once_cell = "1"
bitflags = "2"
smallvec = { version = "1", features = ["serde"] }
indexmap = { version = "2", features = ["serde"] }
ahash = "0.8"

# Wasm support
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "WebGl2RenderingContext",
    "console",
] }

# File system
walkdir = "2"
notify = "6"

# Image processing
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "bmp", "webp"] }

# Scripting / Plugin
wasmtime = { version = "27", features = ["component-model"] }

# UI (GPUI-like abstraction layer - using taffy for layout)
taffy = "0.5"

# Workspace internal crates
ummerse-core = { path = "crates/ummerse-core" }
ummerse-math = { path = "crates/ummerse-math" }
ummerse-renderer = { path = "crates/ummerse-renderer" }
ummerse-scene = { path = "crates/ummerse-scene" }
ummerse-asset = { path = "crates/ummerse-asset" }
ummerse-script = { path = "crates/ummerse-script" }
ummerse-physics = { path = "crates/ummerse-physics" }
ummerse-audio = { path = "crates/ummerse-audio" }
ummerse-editor = { path = "crates/ummerse-editor" }
ummerse-runtime = { path = "crates/ummerse-runtime" }
ummerse-plugin = { path = "crates/ummerse-plugin" }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true

[profile.wasm-release]
inherits = "release"
opt-level = "s"
strip = true
